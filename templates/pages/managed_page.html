{% extends "base.html" %}
{% from 'macros/url.html' import u %}

{% block content %}
<section class="section static-page">
    <div class="container static-page-inner">
        <h1 class="static-page-title">{{ page.title }}</h1>
        <div class="static-page-body">
            {{ (page.content_html or '') | safe }}
        </div>
        <p><a href="{{ u('/') }}" class="btn btn-outline">{{ t.pages.back_home }}</a></p>
    </div>
</section>
{% endblock %}
